<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grandpa Glitch: Part 1 💖</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffeef2; font-family: sans-serif; }
        
        /* Music Player Box */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            border: 1px solid #ffb6c1;
        }

        .canva-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div class="music-player">
        <span style="margin-right: 15px; font-size: 14px; color: #ff4d6d;">Our Song ✨</span>
        <audio id="myAudio" controls autoplay loop>
            <source src="https://youtube.com/shorts/NL7VlhpZa_g?si=4ax2pPmd-XKA0Hv5" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="canva-container">
        
        <div style="position: relative; width: 100%; height: 0; padding-top: 56.2225%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHD0QU1MGw/3aFxgtI0bya9hZuWkDOp-A/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHD0QU1MGw&#x2F;3aFxgtI0bya9hZuWkDOp-A&#x2F;view?utm_content=DAHD0QU1MGw&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">Love</a> by Min Yoongi

    </div>

    <script>
        /* This helps music play when he clicks anywhere on the screen */
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('myAudio');
            audio.play();
        }, { once: true });
    </script>

</body>
</html>
